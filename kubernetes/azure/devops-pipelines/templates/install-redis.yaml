parameters:
  - name: RELEASE_NAME
    type: string
    default: "redis-perf"
  - name: NAMESPACE
    type: string
    default: "redis"
  - name: REDIS_PASSWORD
    type: string
    default: ""
  - name: INSTALL_REDIS_INSIGHT
    type: boolean
    default: true

steps:
  - template: ./utils/set-aks-credentials.yaml
  - task: AzureCLI@2
    displayName: "Install Redis"
    inputs:
      azureSubscription: $(AZURE_SERVICE_CONNECTION_NAME)
      scriptType: "bash"
      scriptLocation: "inlineScript"
      inlineScript: |
        set -e
        echo "Creating namespace ${{ parameters.NAMESPACE }} if it does not exist"
        kubectl create namespace ${{ parameters.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

        echo "Adding Bitnami Helm repository"
        helm repo add bitnami https://charts.bitnami.com/bitnami
        helm repo update

        echo "Installing Redis Helm Chart"
        helm upgrade --install ${{ parameters.RELEASE_NAME }} bitnami/redis \
          --namespace ${{ parameters.NAMESPACE }} \
          --set auth.password=${{ parameters.REDIS_PASSWORD }} \
          --set architecture=standalone \
          --set master.persistence.enabled=false \
          --wait --timeout 5m
        echo "Redis Helm Chart installed successfully"
        echo "Redis is accessible at: ${{ parameters.RELEASE_NAME }}-master.${{ parameters.NAMESPACE }}.svc.cluster.local:6379"

        if [ "$INSTALL_REDIS_INSIGHT" = "true" ]; then
          echo "Deploying RedisInsight in namespace ${{ parameters.NAMESPACE }}"
          kubectl create deployment redisinsight \
            --namespace ${{ parameters.NAMESPACE }} \
            --image redis/redisinsight:latest \
            --replicas 1 \
            --dry-run=client -o yaml \
          | kubectl apply -f -

          kubectl set env deployment/redisinsight \
            --namespace ${{ parameters.NAMESPACE }} \
            RI_APP_HOST=0.0.0.0 \
            RI_APP_PORT=5540

          kubectl expose deployment redisinsight \
            --namespace ${{ parameters.NAMESPACE }} \
            --name redisinsight-service \
            --type ClusterIP \
            --port 5540 \
            --target-port 5540 \
            --dry-run=client -o yaml \
          | kubectl apply -f -

          echo "RedisInsight deployed successfully"
          echo "Access via port-forward: kubectl port-forward svc/redisinsight-service 5540:5540 -n ${{ parameters.NAMESPACE }}"
        fi
    env:
      INSTALL_REDIS_INSIGHT: ${{ parameters.INSTALL_REDIS_INSIGHT }}
