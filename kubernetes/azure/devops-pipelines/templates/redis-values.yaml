# Bitnami Redis Helm values — performance tuning for high-concurrency load testing.
# Master is sized for 50,000 RPS (all reads + writes route through it).
# Replicas provide HA and autoscale for future read offload.

master:
  configuration: |
    maxmemory 14gb
    maxmemory-policy allkeys-lru
    maxclients 100000
    tcp-backlog 65535
    hz 20
    lazyfree-lazy-eviction yes
    lazyfree-lazy-expire yes
    lazyfree-lazy-server-del yes
    activerehashing yes
    io-threads 8
    io-threads-do-reads yes
    loglevel notice

replica:
  configuration: |
    maxmemory 6gb
    maxmemory-policy allkeys-lru
    maxclients 100000
    tcp-backlog 65535
    hz 20
    lazyfree-lazy-eviction yes
    lazyfree-lazy-expire yes
    lazyfree-lazy-server-del yes
    activerehashing yes
    io-threads 4
    io-threads-do-reads yes
    loglevel notice
