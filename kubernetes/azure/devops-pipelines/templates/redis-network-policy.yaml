# NetworkPolicy to allow Thunder (default namespace) to reach Redis (redis namespace) on port 6379.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-thunder-to-redis
  namespace: redis
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: redis
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: default
      ports:
        - protocol: TCP
          port: 6379
  policyTypes:
    - Ingress
