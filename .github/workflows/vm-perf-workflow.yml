name: VM Performance Test on AWS

on:
  workflow_dispatch:
    inputs:
      THUNDER_PACK_URL:
        description: 'URL to download Thunder pack'
        required: true
        default: 'https://github.com/asgardeo/thunder/releases/download/v0.7.0/thunder-v0.7.0-linux-x64.zip'
        type: string
      DEPLOYMENT:
        description: 'Deployment type'
        required: true
        default: 'single-node'
        type: choice
        options:
          - single-node
      THUNDER_INSTANCE_TYPE:
        description: 'Thunder VM instance type. Specs - t2.nano: 1 vCPU/0.5 GB/Low-Moderate | t2.micro: 1 vCPU/1 GB/Low-Moderate | t2.small: 1 vCPU/2 GB/Low-Moderate | t3a.nano: 2 vCPU/0.5 GB/Up to 5 Gbps | t3a.micro: 2 vCPU/1 GB/Up to 5 Gbps | t3a.small: 2 vCPU/2 GB/Up to 5 Gbps | t3a.medium: 2 vCPU/4 GB/Up to 5 Gbps | t3a.large: 2 vCPU/8 GB/Up to 5 Gbps | t3a.xlarge: 4 vCPU/16 GB/Up to 5 Gbps | t3a.2xlarge: 8 vCPU/32 GB/Up to 5 Gbps'
        required: true
        default: 't3a.medium'
        type: choice
        options:
          - t2.nano
          - t2.micro
          - t2.small
          - t3a.nano
          - t3a.micro
          - t3a.small
          - t3a.medium
          - t3a.large
          - t3a.xlarge
          - t3a.2xlarge
      ADDITIONAL_PARAMS_TO_RUN_PERFORMANCE_SCRIPT:
        description: 'Additional parameters for performance script'
        required: true
        default: '-d 15 -w 5 -x false -y JWT'
        type: string
      PERFORMANCE_REPO:
        description: 'Performance repository URL'
        required: true
        default: 'https://github.com/asgardeo/thunder-performance'
        type: string
      BRANCH:
        description: 'Branch to use from performance repository'
        required: true
        default: 'main'
        type: string
      MODE:
        description: 'Testing mode'
        required: true
        default: 'FULL'
        type: choice
        options:
          - FULL
          - QUICK
      USE_DELAYS:
        description: 'Enable delays in testing'
        required: true
        default: true
        type: boolean
      CONCURRENCY:
        description: 'Concurrency pattern'
        required: true
        default: '50-50'
        type: choice
        options:
          - '50-50'
          - '50-500'
          - '50-1000'
          - '500-3000'
          - '1000-3000'
      DB_INSTANCE_TYPE:
        description: 'RDS DB instance type. Specs - db.t3.medium: 2 vCPU/4 GB | db.t3.large: 2 vCPU/8 GB | db.t3.xlarge: 4 vCPU/16 GB | db.m6i.large: 2 vCPU/8 GB | db.m6i.xlarge: 4 vCPU/16 GB | db.m6i.2xlarge: 8 vCPU/32 GB'
        required: true
        default: 'db.t3.medium'
        type: choice
        options:
          - db.t3.medium
          - db.t3.large
          - db.t3.xlarge
          - db.m6i.large
          - db.m6i.xlarge
          - db.m6i.2xlarge
      PUSH_BENCHMARKS_TO_GITHUB:
        description: 'Push benchmark results to GitHub'
        required: false
        default: false
        type: boolean

  workflow_call:
    inputs:
      THUNDER_PACK_URL:
        description: 'URL to download Thunder pack'
        required: false
        default: 'https://github.com/asgardeo/thunder/releases/download/v0.7.0/thunder-v0.7.0-linux-x64.zip'
        type: string
      DEPLOYMENT:
        description: 'Deployment type'
        required: false
        default: 'single-node'
        type: string
      THUNDER_INSTANCE_TYPE:
        description: 'Thunder VM instance type'
        required: false
        default: 't3a.medium'
        type: string
      ADDITIONAL_PARAMS_TO_RUN_PERFORMANCE_SCRIPT:
        description: 'Additional parameters for performance script'
        required: false
        default: '-d 15 -w 5 -x false -y JWT'
        type: string
      PERFORMANCE_REPO:
        description: 'Performance repository URL'
        required: false
        default: 'https://github.com/asgardeo/thunder-performance'
        type: string
      BRANCH:
        description: 'Branch to use from performance repository'
        required: false
        default: 'main'
        type: string
      MODE:
        description: 'Testing mode'
        required: false
        default: 'FULL'
        type: string
      USE_DELAYS:
        description: 'Enable delays in testing'
        required: false
        default: true
        type: boolean
      CONCURRENCY:
        description: 'Concurrency pattern'
        required: false
        default: '50-50'
        type: string
      DB_INSTANCE_TYPE:
        description: 'RDS DB instance type'
        required: false
        default: 'db.t3.medium'
        type: string
      PUSH_BENCHMARKS_TO_GITHUB:
        description: 'Push benchmark results to GitHub'
        required: false
        default: false
        type: boolean
      THUNDER_ARTIFACT_NAME:
        description: 'Name of the artifact to download'
        required: false
        type: string
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      THUNDER_PERFORMANCE_GITHUB_BOT_TOKEN:
        required: true

permissions:
  contents: write

jobs:
  vm-performance-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-1

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download Thunder Artifact
        if: ${{ inputs.THUNDER_ARTIFACT_NAME != '' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.THUNDER_ARTIFACT_NAME }}
          path: ${{ github.workspace }}

      - name: Clone Performance Repository
        env:
          PERFORMANCE_REPO: ${{ inputs.PERFORMANCE_REPO }}
          BRANCH: ${{ inputs.BRANCH }}
          GITHUB_TOKEN: ${{ secrets.THUNDER_PERFORMANCE_GITHUB_BOT_TOKEN }}
        run: |
          cd $GITHUB_WORKSPACE
          rm -rf workspace resources
          mkdir workspace resources
          cd workspace
          git clone https://x-access-token:${GITHUB_TOKEN}@${PERFORMANCE_REPO#https://}
          cd thunder-performance
          git checkout $BRANCH
          echo "Cloned thunder-performance at branch $BRANCH"

      - name: Download Infrastructure Resources
        run: |
          RESOURCES_DIR=$GITHUB_WORKSPACE/resources
          echo "Downloading thunder-perf-test.pem..."
          aws s3 cp s3://performance-thunder/keys/thunder-perf-test.pem $RESOURCES_DIR/thunder-perf-test.pem --only-show-errors --no-progress
          chmod 400 $RESOURCES_DIR/thunder-perf-test.pem
          echo "Downloading apache-jmeter-5.6.3.tgz..."
          aws s3 cp s3://performance-thunder-resources/apache-jmeter-5.6.3.tgz $RESOURCES_DIR/apache-jmeter-5.6.3.tgz --only-show-errors --no-progress

      - name: Build Performance Tests
        env:
          DEPLOYMENT: ${{ inputs.DEPLOYMENT }}
        run: |
          cd $GITHUB_WORKSPACE/workspace/thunder-performance/perf-scripts/$DEPLOYMENT
          echo "Building performance test project: $DEPLOYMENT..."
          mvn -q clean install

      - name: Create CloudFormation Stack
        id: create-cf-stack
        env:
          WORKSPACE: ${{ github.workspace }}
          DEPLOYMENT: ${{ inputs.DEPLOYMENT }}
          THUNDER_INSTANCE_TYPE: ${{ inputs.THUNDER_INSTANCE_TYPE }}
          DB_INSTANCE_TYPE: ${{ inputs.DB_INSTANCE_TYPE }}
          CONCURRENCY: ${{ inputs.CONCURRENCY }}
          DB_TYPE: 'postgres'
          BUILD_USER_EMAIL: ${{ github.actor }}@github.com
        run: |
          chmod +x .github/scripts/create-cf-stack.sh
          bash .github/scripts/create-cf-stack.sh

      - name: Execute VM Performance Test
        env:
          WORKSPACE: ${{ github.workspace }}
          THUNDER_PACK_URL: ${{ inputs.THUNDER_PACK_URL }}
          DEPLOYMENT: ${{ inputs.DEPLOYMENT }}
          ADDITIONAL_PARAMS_TO_RUN_PERFORMANCE_SCRIPT: ${{ inputs.ADDITIONAL_PARAMS_TO_RUN_PERFORMANCE_SCRIPT }}
          PERFORMANCE_REPO: ${{ inputs.PERFORMANCE_REPO }}
          BRANCH: ${{ inputs.BRANCH }}
          MODE: ${{ inputs.MODE }}
          USE_DELAYS: ${{ inputs.USE_DELAYS }}
          CONCURRENCY: ${{ inputs.CONCURRENCY }}
          DB_TYPE: 'postgres'
          BUILD_USER_EMAIL: ${{ github.actor }}@github.com
          BUILD_CAUSE: ${{ github.event_name }}
          BUILD_NUMBER: ${{ github.run_number }}
          GITHUB_TOKEN: ${{ secrets.THUNDER_PERFORMANCE_GITHUB_BOT_TOKEN }}
          PUSH_BENCHMARKS_TO_GITHUB: ${{ inputs.PUSH_BENCHMARKS_TO_GITHUB }}
          BASTION_NODE_IP: ${{ steps.create-cf-stack.outputs.bastion_node_ip }}
          NGINX_INSTANCE_IP: ${{ steps.create-cf-stack.outputs.nginx_instance_ip }}
          WSO2_THUNDER_1_IP: ${{ steps.create-cf-stack.outputs.wso2_thunder_1_ip }}
          RDS_HOST: ${{ steps.create-cf-stack.outputs.rds_host }}
        run: |
          chmod +x .github/scripts/vm-perf-workflow-script.sh
          bash .github/scripts/vm-perf-workflow-script.sh

      - name: Delete CloudFormation Stack
        if: always() && steps.create-cf-stack.outputs.stack_id != ''
        env:
          STACK_ID: ${{ steps.create-cf-stack.outputs.stack_id }}
        run: |
          chmod +x .github/scripts/delete-cf-stack.sh
          bash .github/scripts/delete-cf-stack.sh

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-test-results-${{ github.run_number }}
          path: ${{ github.workspace }}/workspace/results-*
          retention-days: 30
